<!DOCTYPE html>    
<html lang="si">    
<head>    
    <meta charset="UTF-8">    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>Advanced OT Tracker | CIC Livestock Solutions</title>    
    <script src="https://cdn.tailwindcss.com"></script>    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>    
        
    <script type="module">    
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";    
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";    
        import { getFirestore, doc, setDoc, getDoc, collection, query, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";    
    
        const firebaseConfig = {    
            apiKey: "AIzaSyBT3joJWX-dsz4C9-wKsffepSpXypn1n9E",    
            authDomain: "time-management-28962.firebaseapp.com",    
            projectId: "time-management-28962",    
            storageBucket: "time-management-28962.firebasestorage.app",    
            messagingSenderId: "813174935711",    
            appId: "1:813174935711:web:066f4442e08e600cf512aa"    
        };    
    
        const app = initializeApp(firebaseConfig);    
        const auth = getAuth(app);    
        const db = getFirestore(app);    
    
        let userHolidays = [];
        let userLeaves = {};
    
        onAuthStateChanged(auth, async (user) => {    
            if (user) {    
                document.getElementById('authScreen').classList.add('hidden');    
                document.getElementById('appScreen').classList.remove('hidden');    
                await loadHolidays();
                await loadLeaves();
                renderSheet();    
            } else {    
                document.getElementById('authScreen').classList.remove('hidden');    
                document.getElementById('appScreen').classList.add('hidden');    
            }    
        });    

        // --- DATA LOADING ---
        async function loadLeaves() {
            const user = auth.currentUser;
            const monthId = `${document.getElementById('yearSelect').value}-${parseInt(document.getElementById('monthSelect').value) + 1}`;
            const docSnap = await getDoc(doc(db, "users", user.uid, "leaves", monthId));
            userLeaves = docSnap.exists() ? docSnap.data() : {};
            renderLeaveList();
        }

        async function loadHolidays() {    
            const q = query(collection(db, "users", auth.currentUser.uid, "holidays"));    
            const querySnapshot = await getDocs(q);    
            userHolidays = [];    
            querySnapshot.forEach((doc) => userHolidays.push(doc.id));    
        }

        // --- LEAVE LOGIC ---
        window.saveLeave = async () => {
            const dateInput = document.getElementById('leaveDate').value;
            const type = document.getElementById('leaveType').value;
            const slot = document.getElementById('leaveSlot').value;
            if(!dateInput) return alert("දිනය තෝරන්න");

            const dateObj = new Date(dateInput);
            const day = dateObj.getDate();
            const monthId = `${dateObj.getFullYear()}-${dateObj.getMonth() + 1}`;
            
            userLeaves[day] = { type, slot };
            await setDoc(doc(db, "users", auth.currentUser.uid, "leaves", monthId), userLeaves, { merge: true });
            alert("Leave Saved!");
            renderSheet();
            renderLeaveList();
        };

        window.deleteLeave = async (day) => {
            delete userLeaves[day];
            const monthId = `${document.getElementById('yearSelect').value}-${parseInt(document.getElementById('monthSelect').value) + 1}`;
            await setDoc(doc(db, "users", auth.currentUser.uid, "leaves", monthId), userLeaves);
            renderSheet();
            renderLeaveList();
        };

        function renderLeaveList() {
            const list = document.getElementById('leaveList');
            list.innerHTML = Object.entries(userLeaves).map(([day, data]) => `
                <div class="flex justify-between items-center p-3 bg-white rounded-xl mb-2 border border-slate-100 shadow-sm">
                    <div class="text-[10px] font-bold text-slate-600">Day ${day} - ${data.type} (${data.slot})</div>
                    <button onclick="deleteLeave('${day}')" class="text-red-500 text-[10px] font-black uppercase">Delete</button>
                </div>
            `).join('') || `<p class="text-slate-400 text-[10px] text-center py-4">No leaves recorded.</p>`;
        }

        // --- CALCULATION LOGIC ---
        function calculateRow(inTime, outTime, isHoliday, dayOfWeek, isNextDay, wasFullDayShift, leaveData) {
            if (!inTime || !outTime || inTime === "00:00") {
                let req = (dayOfWeek === 0 || dayOfWeek === 6 || isHoliday || wasFullDayShift) ? 0 : 9;
                if (leaveData && (leaveData.type === "Full Leave" || leaveData.type === "Lieu Leave")) req = 0;
                if (leaveData && leaveData.type === "Half Day") req = 4.5;
                return { worked: 0, req, ot: 0, specialOt: 0, lieu: false, isFullDay: false, isShort: false };
            }

            let [h1, m1] = inTime.split(':').map(Number);
            let [h2, m2] = outTime.split(':').map(Number);
            let totalMinutes = (h2 * 60 + m2) - (h1 * 60 + m1);
            if (isNextDay) totalMinutes += 1440;
            
            let hWork = Math.floor(totalMinutes / 60);
            let mWork = totalMinutes % 60;
            let roundedWorked = hWork + (mWork >= 25 && mWork <= 54 ? 0.5 : (mWork >= 55 ? 1.0 : 0));

            let isFullDay = roundedWorked >= 15; 
            let requiredHours = (dayOfWeek === 0 || dayOfWeek === 6 || isHoliday || wasFullDayShift) ? 0 : 9;

            // Apply Leave Reductions to Required Hours
            if (leaveData) {
                if (leaveData.type === "Full Leave" || leaveData.type === "Lieu Leave") {
                    requiredHours = isFullDay ? 9 : 0; 
                } else if (leaveData.type === "Half Day") {
                    requiredHours = 4.5;
                }
            } else if (isFullDay) {
                requiredHours = 18; 
            }

            // Short Time Check
            let isShort = false;
            let inTotal = h1 * 60 + m1;
            let outTotal = h2 * 60 + m2;
            if (isFullDay) {
                if (inTotal > 525 || !isNextDay || (isNextDay && outTotal < 295)) isShort = true;
            } else if (isNextDay) {
                if (inTotal > 1200 || outTotal < 300) isShort = true;
            } else {
                if (inTotal > 525 || outTotal < 1020) isShort = true;
            }

            if (dayOfWeek === 0 || isHoliday) {
                return { worked: roundedWorked, req: requiredHours, ot: 0, specialOt: roundedWorked, lieu: roundedWorked >= 9, isFullDay, isShort };
            } else if (dayOfWeek === 6) {
                return { worked: roundedWorked, req: requiredHours, ot: roundedWorked, specialOt: 0, lieu: false, isFullDay, isShort };
            } else {
                return { worked: roundedWorked, req: requiredHours, ot: Math.max(0, roundedWorked - requiredHours), specialOt: 0, lieu: false, isFullDay, isShort };
            }
        }

        // --- UI RENDER ---
        async function renderSheet() {    
            const user = auth.currentUser;    
            const month = parseInt(document.getElementById('monthSelect').value);    
            const year = parseInt(document.getElementById('yearSelect').value);    
            const container = document.getElementById('sheetContainer');    
            const daysInMonth = new Date(year, month + 1, 0).getDate();    
            const monthId = `${year}-${month + 1}`;    
                
            container.innerHTML = "<div class='p-10 text-center text-slate-400 text-xs font-bold'>SYNCING CLOUD...</div>";    
            const docSnap = await getDoc(doc(db, "users", user.uid, "months", monthId));    
            const savedData = docSnap.exists() ? docSnap.data() : {};    

            container.innerHTML = "";    
            let tOT = 0, tSOT = 0, tLieu = 0, tShort = 0;
            let lastDayWasFullShift = false;
    
            for (let d = 1; d <= daysInMonth; d++) {    
                const dateObj = new Date(year, month, d);
                const dateStr = dateObj.toLocaleDateString('en-CA');
                const isHoliday = userHolidays.includes(dateStr);    
                const dayData = savedData[String(d)] || { in: "00:00", out: "00:00", isNextDay: false };    
                const leaveData = userLeaves[d];

                const res = calculateRow(dayData.in, dayData.out, isHoliday, dateObj.getDay(), dayData.isNextDay, lastDayWasFullShift, leaveData);
                lastDayWasFullShift = res.isFullDay;
                tOT += res.ot; tSOT += res.specialOt; if(res.lieu) tLieu++; if(res.isShort) tShort++;
    
                const row = document.createElement('div');    
                row.className = `flex items-center gap-1 p-3 border-b ${isHoliday ? 'bg-red-50' : (dateObj.getDay() === 0 ? 'bg-orange-50' : 'bg-white')}`;    
                row.innerHTML = `    
                    <div class="w-8 text-center">    
                        <span class="block text-[7px] font-bold text-slate-400 uppercase">${dateObj.toLocaleDateString('en-US', { weekday: 'short' })}</span>    
                        <span class="text-base font-black text-slate-700 leading-none">${d}</span>    
                    </div>    
                    <div class="flex-1 grid grid-cols-2 gap-1 opacity-80">    
                        <input type="time" value="${dayData.in}" class="p-1 rounded-lg border text-[10px] bg-slate-50 outline-none" readonly>
                        <div class="relative"><input type="time" value="${dayData.out}" class="w-full p-1 rounded-lg border text-[10px] bg-slate-50 outline-none" readonly></div>
                    </div>
                    <div class="w-20 text-center text-[8px] font-bold border-x px-1 leading-tight">
                        <p class="text-blue-600 truncate">${leaveData ? leaveData.type.toUpperCase() : '-'}</p>
                        <div class="flex justify-between mt-1"><span class="text-slate-400">W:${res.worked}</span><span class="text-red-500">R:${res.req}</span></div>
                    </div>    
                    <div class="w-12 text-right">    
                        <div class="text-[8px] font-black text-blue-600">${res.ot}</div>
                        <div class="text-[8px] font-black text-red-600">${res.specialOt}</div>
                    </div>    
                `;    
                container.appendChild(row);    
            }    
            document.getElementById('totalHrs').innerHTML = `OT: ${tOT.toFixed(1)} | SOT: ${tSOT.toFixed(1)} | Lieu: ${tLieu} | Short: ${tShort}/2`;    
        }

        // --- COMMON HELPERS ---
        window.switchTab = (tab) => {
            ['sheetView', 'holidayView', 'leaveView'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(tab + 'View').classList.remove('hidden');
            if(tab === 'leave') loadLeaves();
        };

        function cleanTime(val) {
            if (!val || val === "-") return "00:00";
            let m = String(val).match(/(\d{1,2}):(\d{1,2})/);
            return m ? `${m[1].padStart(2,'0')}:${m[2].padStart(2,'0')}` : "00:00";
        }

        window.importExcel = () => {
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = '.xlsx, .xls, .csv';
            fileInput.onchange = async (e) => {
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const workbook = XLSX.read(new Uint8Array(event.target.result), { type: 'array', cellDates: true });
                    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { range: 11, defval: "", raw: false });
                    const monthId = `${document.getElementById('yearSelect').value}-${parseInt(document.getElementById('monthSelect').value) + 1}`;
                    let currentData = {};
                    jsonData.forEach(row => {
                        let dK = Object.keys(row).find(k => k.trim() === "Date"), iK = Object.keys(row).find(k => k.trim() === "Check In"), oK = Object.keys(row).find(k => k.trim() === "Check Out"), odK = Object.keys(row).find(k => k.trim() === "Out Date");
                        if(row[dK]) {
                            let ds = String(row[dK]).trim(), p = ds.split(/[-/ ]/), day = p.length >= 3 ? (p[0].length === 4 ? parseInt(p[2]) : parseInt(p[0])) : parseInt(ds);
                            if(day) currentData[String(day)] = { in: cleanTime(row[iK]), out: cleanTime(row[oK]), isNextDay: (row[odK] && row[odK].trim() !== ds) };
                        }
                    });
                    await setDoc(doc(db, "users", auth.currentUser.uid, "months", monthId), currentData, { merge: true });
                    alert("Import Success!"); renderSheet();
                };
                reader.readAsArrayBuffer(e.target.files[0]);
            };
            fileInput.click();
        };

        window.clearMonthData = async () => {
            if(!confirm("Are you sure?")) return;
            const monthId = `${document.getElementById('yearSelect').value}-${parseInt(document.getElementById('monthSelect').value) + 1}`;
            await deleteDoc(doc(db, "users", auth.currentUser.uid, "months", monthId));
            renderSheet();
        };

        window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
        window.logout = () => signOut(auth);
        window.renderSheet = renderSheet;

    </script>    
</head>    
<body class="bg-slate-50 min-h-screen text-slate-900 font-sans pb-12">    
    <div id="authScreen" class="max-w-md mx-auto pt-24 px-6">    
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl text-center border">    
            <h1 class="text-2xl font-black mb-8">Secure Cloud</h1>    
            <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-3 bg-slate-50 rounded-2xl border outline-none">    
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 mb-8 bg-slate-50 rounded-2xl border outline-none">    
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl">LOGIN</button>    
        </div>    
    </div>    
    
    <div id="appScreen" class="hidden max-w-lg mx-auto">    
        <div class="bg-white flex text-center border-b sticky top-0 z-20">    
            <button onclick="switchTab('sheet')" class="flex-1 py-4 font-black text-[10px] uppercase">Daily Sheet</button>    
            <button onclick="switchTab('leave')" class="flex-1 py-4 font-black text-[10px] uppercase">Leaves</button>    
            <button onclick="switchTab('holiday')" class="flex-1 py-4 font-black text-[10px] uppercase">Holidays</button>    
        </div>    
    
        <div id="sheetView" class="p-4">    
            <div class="bg-blue-600 p-6 rounded-[2.5rem] text-white shadow-xl mb-4">    
                <div class="flex justify-between items-center mb-4">    
                    <div id="totalHrs" class="text-[10px] font-black uppercase">Syncing...</div>    
                    <button onclick="logout()" class="text-[8px] font-black bg-white/20 px-2 py-1 rounded">LOGOUT</button>
                </div>
                <div class="flex gap-2 mb-4">    
                    <select id="yearSelect" onchange="renderSheet()" class="bg-white/20 p-2 rounded-xl text-[10px] flex-1 outline-none"><option>2026</option></select>    
                    <select id="monthSelect" onchange="renderSheet()" class="bg-white/20 p-2 rounded-xl text-[10px] flex-1 outline-none">
                        <option value="3">APRIL</option><option value="4">MAY</option>
                    </select>    
                </div>    
                <div class="flex gap-2">
                    <button onclick="importExcel()" class="flex-1 bg-white text-blue-600 text-[10px] py-3 rounded-xl font-black uppercase">Import</button>
                    <button onclick="clearMonthData()" class="flex-1 bg-red-500 text-white text-[10px] py-3 rounded-xl font-black uppercase">Clear</button>
                </div>
            </div>    
            <div id="sheetContainer" class="bg-white rounded-[2rem] border overflow-hidden shadow-sm"></div>    
        </div>

        <div id="leaveView" class="hidden p-6">
            <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm mb-6">
                <h3 class="font-black text-xs uppercase mb-4 text-slate-400">Record Leave</h3>
                <input type="date" id="leaveDate" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 text-sm outline-none">
                <select id="leaveType" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 text-sm outline-none">
                    <option>Full Leave</option><option>Half Day</option><option>Short Leave</option><option>Lieu Leave</option>
                </select>
                <select id="leaveSlot" class="w-full p-3 bg-slate-50 border rounded-xl mb-4 text-sm outline-none">
                    <option>Full Day</option><option>Morning (8:30-1:00)</option><option>Evening (1:00-5:30)</option>
                </select>
                <button onclick="saveLeave()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg">SAVE ENTRY</button>
            </div>
            <div id="leaveList"></div>
        </div>
    
        <div id="holidayView" class="hidden p-6 text-center">    
            <input type="date" id="holidayInput" class="w-full p-4 bg-white border rounded-xl mb-4 outline-none">    
            <button onclick="addHoliday()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg">ADD HOLIDAY</button>
        </div>    
    </div>    
</body>    
</html>
