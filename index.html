<!DOCTYPE html>    
<html lang="si">    
<head>    
    <meta charset="UTF-8">    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>Advanced OT Tracker | CIC Livestock Solutions</title>    
    <script src="https://cdn.tailwindcss.com"></script>    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>    
        
    <script type="module">    
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";    
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";    
        import { getFirestore, doc, setDoc, getDoc, collection, query, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";    
    
        const firebaseConfig = {    
            apiKey: "AIzaSyBT3joJWX-dsz4C9-wKsffepSpXypn1n9E",    
            authDomain: "time-management-28962.firebaseapp.com",    
            projectId: "time-management-28962",    
            storageBucket: "time-management-28962.firebasestorage.app",    
            messagingSenderId: "813174935711",    
            appId: "1:813174935711:web:066f4442e08e600cf512aa"    
        };    
    
        const app = initializeApp(firebaseConfig);    
        const auth = getAuth(app);    
        const db = getFirestore(app);    
    
        let userHolidays = [];
        let userLeaves = {};
    
        onAuthStateChanged(auth, async (user) => {    
            if (user) {    
                document.getElementById('authScreen').classList.add('hidden');    
                document.getElementById('appScreen').classList.remove('hidden');    
                await loadHolidays();
                await loadLeaves();
                renderSheet();    
            } else {    
                document.getElementById('authScreen').classList.remove('hidden');    
                document.getElementById('appScreen').classList.add('hidden');    
            }    
        });    

        // --- LOAD DATA ---
        async function loadLeaves() {
            const user = auth.currentUser;
            const monthId = `${document.getElementById('yearSelect').value}-${parseInt(document.getElementById('monthSelect').value) + 1}`;
            const docSnap = await getDoc(doc(db, "users", user.uid, "leaves", monthId));
            userLeaves = docSnap.exists() ? docSnap.data() : {};
            renderLeaveList();
        }

        async function loadHolidays() {    
            const q = query(collection(db, "users", auth.currentUser.uid, "holidays"));    
            const querySnapshot = await getDocs(q);    
            userHolidays = [];    
            querySnapshot.forEach((doc) => userHolidays.push(doc.id));    
        }

        // --- LEAVE MANAGEMENT ---
        window.saveLeave = async () => {
            const date = document.getElementById('leaveDate').value;
            const type = document.getElementById('leaveType').value;
            const slot = document.getElementById('leaveSlot').value;
            if(!date) return alert("දිනය තෝරන්න");

            const day = new Date(date).getDate();
            const monthId = `${new Date(date).getFullYear()}-${new Date(date).getMonth() + 1}`;
            
            userLeaves[day] = { type, slot };
            await setDoc(doc(db, "users", auth.currentUser.uid, "leaves", monthId), userLeaves, { merge: true });
            alert("නිවාඩු ඇතුළත් කළා!");
            renderSheet();
            renderLeaveList();
        };

        window.deleteLeave = async (day) => {
            delete userLeaves[day];
            const monthId = `${document.getElementById('yearSelect').value}-${parseInt(document.getElementById('monthSelect').value) + 1}`;
            await setDoc(doc(db, "users", auth.currentUser.uid, "leaves", monthId), userLeaves);
            renderSheet();
            renderLeaveList();
        };

        function renderLeaveList() {
            const list = document.getElementById('leaveList');
            list.innerHTML = Object.entries(userLeaves).map(([day, data]) => `
                <div class="flex justify-between items-center p-3 bg-white rounded-xl mb-2 border shadow-sm">
                    <div class="text-xs font-bold text-slate-600">Day ${day} - ${data.type} (${data.slot})</div>
                    <button onclick="deleteLeave('${day}')" class="text-red-500 text-[10px] font-black uppercase">Delete</button>
                </div>
            `).join('') || `<p class="text-slate-400 text-xs text-center py-4">No leaves added for this month.</p>`;
        }

        // --- CALCULATIONS ---
        function calculateRow(inTime, outTime, isHoliday, dayOfWeek, isNextDay, wasFullDayShift, leaveData) {
            let [h1, m1] = inTime.split(':').map(Number);
            let [h2, m2] = outTime.split(':').map(Number);
            let totalMinutes = (inTime && outTime && inTime !== "00:00") ? ((h2 * 60 + m2) - (h1 * 60 + m1)) : 0;
            if (isNextDay) totalMinutes += 1440;
            
            let hWork = Math.floor(totalMinutes / 60);
            let mWork = totalMinutes % 60;
            let roundedWorked = hWork + (mWork >= 25 && mWork <= 54 ? 0.5 : (mWork >= 55 ? 1.0 : 0));

            let isFullDay = roundedWorked >= 15; 
            let req = (dayOfWeek === 0 || dayOfWeek === 6 || isHoliday || wasFullDayShift) ? 0 : 9;

            // Leave Logic for Required Hours
            if (leaveData) {
                if (leaveData.type === "Full Leave" || leaveData.type === "Lieu Leave") {
                    req = isFullDay ? 9 : 0; // If night shift done on full leave day, only 9 hrs req
                } else if (leaveData.type === "Half Day") {
                    req = Math.max(0, req - 4.5);
                }
            }

            if (isFullDay && !leaveData && req > 0) req = 18;

            let isShort = false;
            if (roundedWorked > 0) {
                if (isFullDay && (h1*60+m1 > 525 || (isNextDay && h2*60+m2 < 295))) isShort = true;
                else if (isNextDay && (h1*60+m1 > 1200 || h2*60+m2 < 300)) isShort = true;
                else if (!isNextDay && (h1*60+m1 > 525 || h2*60+m2 < 1020)) isShort = true;
            }

            let ot = (dayOfWeek === 0 || isHoliday) ? 0 : Math.max(0, roundedWorked - req);
            let specialOt = (dayOfWeek === 0 || isHoliday) ? roundedWorked : 0;

            return { worked: roundedWorked, req, ot, specialOt, lieu: (dayOfWeek === 0 || isHoliday) && roundedWorked >= 9, isFullDay, isShort };
        }

        // --- RENDER ---
        async function renderSheet() {    
            const user = auth.currentUser;    
            const month = parseInt(document.getElementById('monthSelect').value);    
            const year = parseInt(document.getElementById('yearSelect').value);    
            const container = document.getElementById('sheetContainer');    
            const daysInMonth = new Date(year, month + 1, 0).getDate();    
            const monthId = `${year}-${month + 1}`;    
                
            container.innerHTML = "<div class='p-10 text-center text-slate-400 text-xs'>Loading...</div>";    
            const docSnap = await getDoc(doc(db, "users", user.uid, "months", monthId));    
            const savedData = docSnap.exists() ? docSnap.data() : {};    

            container.innerHTML = "";    
            let totalOT = 0, totalSpecialOT = 0, totalLieu = 0, totalShort = 0;
            let lastDayWasFullShift = false;
    
            for (let d = 1; d <= daysInMonth; d++) {    
                const dateObj = new Date(year, month, d);    
                const dateStr = dateObj.toLocaleDateString('en-CA');    
                const isHoliday = userHolidays.includes(dateStr);    
                const dayData = savedData[String(d)] || { in: "00:00", out: "00:00", isNextDay: false };    
                const leaveData = userLeaves[d];
                
                const result = calculateRow(dayData.in, dayData.out, isHoliday, dateObj.getDay(), dayData.isNextDay, lastDayWasFullShift, leaveData);
                lastDayWasFullShift = result.isFullDay;

                totalOT += result.ot; totalSpecialOT += result.specialOt;
                if(result.lieu) totalLieu++; if(result.isShort) totalShort++;
    
                const row = document.createElement('div');    
                row.className = `flex items-center gap-1 p-3 border-b ${isHoliday ? 'bg-red-50' : (dateObj.getDay() === 0 ? 'bg-orange-50' : 'bg-white')}`;    
                row.innerHTML = `    
                    <div class="w-8 text-center">    
                        <span class="block text-[7px] font-bold text-slate-400 uppercase">${dateObj.toLocaleDateString('en-US', { weekday: 'short' })}</span>    
                        <span class="text-base font-black text-slate-700 leading-none">${d}</span>    
                    </div>    
                    <div class="flex-1 grid grid-cols-2 gap-1">    
                        <input type="time" value="${dayData.in}" class="p-1 rounded-lg border text-[10px] outline-none bg-slate-50" readonly>
                        <div class="relative"><input type="time" value="${dayData.out}" class="w-full p-1 rounded-lg border text-[10px] outline-none bg-slate-50" readonly></div>
                    </div>
                    <div class="w-20 text-center text-[8px] font-bold border-x px-1">
                        <p class="text-blue-500 uppercase">${leaveData ? leaveData.type : '-'}</p>
                        <div class="flex justify-between mt-1"><span class="opacity-50">W:${result.worked}</span><span class="text-red-500">R:${result.req}</span></div>
                    </div>    
                    <div class="w-12 text-right leading-tight">    
                        <div class="text-[8px] font-black text-blue-600">${result.ot} OT</div>
                        <div class="text-[8px] font-black text-red-600">${result.specialOt} S</div>
                    </div>    
                `;    
                container.appendChild(row);    
            }    
            document.getElementById('totalHrs').innerHTML = `OT: ${totalOT.toFixed(1)} | SOT: ${totalSpecialOT.toFixed(1)} | Lieu: ${totalLieu} | Short: ${totalShort}/2`;    
        }

        // --- NAVIGATION ---
        window.switchTab = (tab) => {
            ['sheetView', 'holidayView', 'leaveView'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(tab + 'View').classList.remove('hidden');
            if(tab === 'leave') loadLeaves();
        };

        // Standard helpers
        function cleanTime(val) {
            if (!val || val === "-") return "00:00";
            let m = String(val).match(/(\d{1,2}):(\d{1,2})/);
            return m ? `${m[1].padStart(2,'0')}:${m[2].padStart(2,'0')}` : "00:00";
        }
        window.importExcel = () => { /* reuse existing import logic */ };
        window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
        window.logout = () => signOut(auth);
        window.renderSheet = renderSheet;

    </script>    
</head>    
<body class="bg-slate-50 min-h-screen text-slate-900 font-sans pb-10">    
    <div id="authScreen" class="max-w-md mx-auto pt-24 px-6 text-center">    
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl border">
            <h1 class="text-2xl font-black mb-8">Secure Cloud</h1>    
            <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-3 bg-slate-50 rounded-2xl border outline-none">    
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 mb-8 bg-slate-50 rounded-2xl border outline-none">    
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl">LOGIN</button>    
        </div>
    </div>    
    
    <div id="appScreen" class="hidden max-w-lg mx-auto">    
        <div class="bg-white flex text-center border-b sticky top-0 z-20">    
            <button onclick="switchTab('sheet')" class="flex-1 py-4 font-black text-[10px] uppercase">Daily Sheet</button>    
            <button onclick="switchTab('leave')" class="flex-1 py-4 font-black text-[10px] uppercase">Leaves</button>    
            <button onclick="switchTab('holiday')" class="flex-1 py-4 font-black text-[10px] uppercase">Holidays</button>    
        </div>    
    
        <div id="sheetView" class="p-4">    
            <div class="bg-blue-600 p-6 rounded-[2.5rem] text-white shadow-xl mb-4">    
                <div class="flex justify-between mb-4">    
                    <div id="totalHrs" class="text-[11px] font-black">OT: 0 | SOT: 0 | Lieu: 0</div>    
                    <button onclick="logout()" class="text-[8px] font-black uppercase bg-white/20 px-2 py-1 rounded">Logout</button>
                </div>
                <div class="flex gap-2">    
                    <select id="yearSelect" onchange="renderSheet()" class="bg-white/20 p-2 rounded-xl text-[10px] flex-1"><option>2026</option></select>    
                    <select id="monthSelect" onchange="renderSheet()" class="bg-white/20 p-2 rounded-xl text-[10px] flex-1">
                        <option value="3">APRIL</option><option value="4">MAY</option>
                    </select>    
                </div>    
            </div>    
            <div id="sheetContainer" class="bg-white rounded-[2rem] border overflow-hidden"></div>    
        </div>

        <div id="leaveView" class="hidden p-6">
            <div class="bg-white p-6 rounded-[2rem] border mb-6">
                <h3 class="font-black text-xs uppercase mb-4">Apply Leave</h3>
                <input type="date" id="leaveDate" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 outline-none text-sm">
                <select id="leaveType" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 text-sm">
                    <option>Full Leave</option><option>Half Day</option><option>Short Leave</option><option>Lieu Leave</option>
                </select>
                <select id="leaveSlot" class="w-full p-3 bg-slate-50 border rounded-xl mb-4 text-sm">
                    <option>Full Day</option><option>Morning (8:30-1:00)</option><option>Evening (1:00-5:30)</option>
                </select>
                <button onclick="saveLeave()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg">SAVE LEAVE</button>
            </div>
            <div id="leaveList"></div>
        </div>
    
        <div id="holidayView" class="hidden p-6">    
            <div class="bg-white p-6 rounded-[2rem] border mb-4 text-center">
                <input type="date" id="holidayInput" class="w-full p-4 bg-slate-50 border rounded-xl mb-4">    
                <button onclick="addHoliday()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl">ADD HOLIDAY</button>
            </div>
        </div>    
    </div>    
</body>    
</html>
