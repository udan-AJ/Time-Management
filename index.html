<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced OT Tracker | CIC Livestock Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBT3joJWX-dsz4C9-wKsffepSpXypn1n9E",
            authDomain: "time-management-28962.firebaseapp.com",
            projectId: "time-management-28962",
            storageBucket: "time-management-28962.firebasestorage.app",
            messagingSenderId: "813174935711",
            appId: "1:813174935711:web:066f4442e08e600cf512aa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userHolidays = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.remove('hidden');
                await loadHolidays();
                renderSheet();
            } else {
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('appScreen').classList.add('hidden');
            }
        });

        // --- 1. EXCEL IMPORT LOGIC (CUSTOMIZED FOR YOUR IMAGE) ---
        window.importExcel = () => {
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = '.xlsx, .xls';
            
            fileInput.onchange = async (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                
                reader.onload = async (event) => {
                    const data = new Uint8Array(event.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    
                    // Range 11 means it starts reading from Row 12
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet, { range: 11 }); 
                    
                    if(jsonData.length === 0) return alert("Excel දත්ත හමු වුනේ නැත!");

                    const user = auth.currentUser;
                    const monthId = `${document.getElementById('yearSelect').value}-${parseInt(document.getElementById('monthSelect').value) + 1}`;
                    const docRef = doc(db, "users", user.uid, "months", monthId);
                    
                    const docSnap = await getDoc(docRef);
                    let currentData = docSnap.exists() ? docSnap.data() : {};

                    jsonData.forEach(row => {
                        let rawDate = row["Date"];
                        let inTime = row["Check In"];
                        let outTime = row["Check Out"];

                        if(rawDate && inTime !== undefined && outTime !== undefined) {
                            // Extracting day from YYYY-MM-DD
                            let dayMatch = String(rawDate).match(/\d{4}-\d{2}-(\d{2})/);
                            let day = dayMatch ? parseInt(dayMatch[1]) : null;

                            if (day) {
                                currentData[day] = { 
                                    in: formatTime(inTime), 
                                    out: formatTime(outTime) 
                                };
                            }
                        }
                    });

                    await setDoc(docRef, currentData);
                    alert("Excel දත්ත සාර්ථකව පූරණය කළා!");
                    renderSheet();
                };
                reader.readAsArrayBuffer(file);
            };
            fileInput.click();
        };

        function formatTime(val) {
            if (typeof val === 'number') {
                const totalMinutes = Math.round(val * 24 * 60);
                const hours = Math.floor(totalMinutes / 60);
                const mins = totalMinutes % 60;
                return `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;
            }
            if (typeof val === 'string' && val.includes(':')) {
                let parts = val.split(':');
                return `${parts[0].padStart(2, '0')}:${parts[1].padStart(2, '0')}`;
            }
            return val;
        }

        // --- 2. CALCULATION LOGIC (0.25 / 0.55 ROUNDING) ---
        function calculateHours(inTime, outTime) {
            if (!inTime || !outTime || inTime === "00:00" || outTime === "00:00") return 0;
            
            let start = new Date(`2000-01-01T${inTime}`);
            let end = new Date(`2000-01-01T${outTime}`);
            
            if (end <= start) end = new Date(`2000-01-02T${outTime}`);
            
            let rawHours = (end - start) / (1000 * 60 * 60);
            let integerPart = Math.floor(rawHours);
            let decimalPart = rawHours - integerPart;
            
            let roundedDecimal;
            if (decimalPart < 0.25) {
                roundedDecimal = 0.0;
            } else if (decimalPart < 0.55) {
                roundedDecimal = 0.5;
            } else {
                roundedDecimal = 1.0;
            }

            return (integerPart + roundedDecimal).toFixed(1);
        }

        // --- 3. CORE APP FUNCTIONS ---
        async function loadHolidays() {
            const user = auth.currentUser;
            const q = query(collection(db, "users", user.uid, "holidays"));
            const querySnapshot = await getDocs(q);
            userHolidays = [];
            querySnapshot.forEach((doc) => userHolidays.push(doc.id));
            renderHolidayList();
        }

        window.addHoliday = async () => {
            const date = document.getElementById('holidayInput').value;
            if (!date) return;
            await setDoc(doc(db, "users", auth.currentUser.uid, "holidays", date), { active: true });
            await loadHolidays();
            renderSheet();
        };

        window.removeHoliday = async (date) => {
            await deleteDoc(doc(db, "users", auth.currentUser.uid, "holidays", date));
            await loadHolidays();
            renderSheet();
        };

        function renderHolidayList() {
            const list = document.getElementById('holidayList');
            list.innerHTML = userHolidays.map(date => `
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl mb-2 border">
                    <span class="font-bold text-slate-700">${date}</span>
                    <button onclick="removeHoliday('${date}')" class="text-red-500 text-[10px] font-black">REMOVE</button>
                </div>
            `).join('');
        }

        async function renderSheet() {
            const user = auth.currentUser;
            if (!user) return;
            const month = parseInt(document.getElementById('monthSelect').value);
            const year = parseInt(document.getElementById('yearSelect').value);
            const container = document.getElementById('sheetContainer');
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const monthId = `${year}-${month + 1}`;
            const docSnap = await getDoc(doc(db, "users", user.uid, "months", monthId));
            const savedData = docSnap.exists() ? docSnap.data() : {};

            container.innerHTML = "";
            let monthlyTotal = 0;

            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(year, month, d);
                const dateStr = dateObj.toLocaleDateString('en-CA');
                const isWeekend = dateObj.getDay() === 0 || dateObj.getDay() === 6;
                const isHoliday = userHolidays.includes(dateStr);
                const dayData = savedData[d] || { in: "", out: "" };
                const hrs = calculateHours(dayData.in, dayData.out);
                monthlyTotal += parseFloat(hrs);

                const row = document.createElement('div');
                row.className = `flex items-center gap-2 p-3 border-b ${isHoliday ? 'bg-red-50' : (isWeekend ? 'bg-orange-50' : 'bg-white')}`;
                row.innerHTML = `
                    <div class="w-10 text-center">
                        <span class="block text-[8px] font-bold text-slate-400 uppercase">${dateObj.toLocaleDateString('en-US', { weekday: 'short' })}</span>
                        <span class="text-lg font-black text-slate-700">${d}</span>
                    </div>
                    <div class="flex-1 grid grid-cols-2 gap-2">
                        <input type="time" value="${dayData.in}" onchange="updateRecord(${d}, 'in', this.value)" class="p-2 rounded-xl border text-sm outline-none focus:ring-2 focus:ring-blue-400">
                        <input type="time" value="${dayData.out}" onchange="updateRecord(${d}, 'out', this.value)" class="p-2 rounded-xl border text-sm outline-none focus:ring-2 focus:ring-blue-400">
                    </div>
                    <div class="w-12 text-right font-black text-blue-600 text-xs">${hrs}h</div>
                `;
                container.appendChild(row);
            }
            document.getElementById('totalHrs').innerText = monthlyTotal.toFixed(1) + " Hrs";
        }

        window.updateRecord = async (day, type, value) => {
            const user = auth.currentUser;
            const monthId = `${document.getElementById('yearSelect').value}-${parseInt(document.getElementById('monthSelect').value) + 1}`;
            const docRef = doc(db, "users", user.uid, "months", monthId);
            const docSnap = await getDoc(docRef);
            let data = docSnap.exists() ? docSnap.data() : {};
            if (!data[day]) data[day] = { in: "", out: "" };
            data[day][type] = value;
            await setDoc(docRef, data, { merge: true });
            renderSheet();
        };

        window.switchTab = (tab) => {
            document.getElementById('sheetView').classList.toggle('hidden', tab !== 'sheet');
            document.getElementById('holidayView').classList.toggle('hidden', tab !== 'holidays');
            document.getElementById('tabSheet').className = tab === 'sheet' ? 'flex-1 py-4 text-blue-600 border-b-4 border-blue-600 font-black text-xs uppercase' : 'flex-1 py-4 text-slate-400 font-bold text-xs uppercase';
            document.getElementById('tabHolidays').className = tab === 'holidays' ? 'flex-1 py-4 text-blue-600 border-b-4 border-blue-600 font-black text-xs uppercase' : 'flex-1 py-4 text-slate-400 font-bold text-xs uppercase';
        };

        window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).catch(err => alert(err.message));
        window.logout = () => signOut(auth);
        window.renderSheet = renderSheet;

    </script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <div id="authScreen" class="max-w-md mx-auto pt-24 px-6">
        <div class="bg-white p-10 rounded-[3rem] shadow-xl text-center">
            <h1 class="text-3xl font-black mb-8">Secure Cloud</h1>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-3 bg-slate-50 rounded-2xl border outline-none">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 mb-8 bg-slate-50 rounded-2xl border outline-none">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-lg">LOGIN</button>
        </div>
    </div>

    <div id="appScreen" class="hidden max-w-lg mx-auto">
        <div class="bg-white flex text-center border-b sticky top-0 z-20">
            <button id="tabSheet" onclick="switchTab('sheet')" class="flex-1 py-4 text-blue-600 border-b-4 border-blue-600 font-black">DAILY SHEET</button>
            <button id="tabHolidays" onclick="switchTab('holidays')" class="flex-1 py-4 text-slate-400 font-bold">HOLIDAYS</button>
        </div>

        <div id="sheetView" class="p-4">
            <div class="bg-blue-600 p-6 rounded-[2.5rem] text-white shadow-2xl mb-6 flex justify-between items-center">
                <div>
                    <h2 id="totalHrs" class="text-4xl font-black">0.0 Hrs</h2>
                    <div class="flex gap-2 mt-4">
                        <select id="yearSelect" onchange="renderSheet()" class="bg-white/20 text-[10px] p-2 rounded-xl font-bold outline-none">
                            <option value="2026">2026</option><option value="2025">2025</option>
                        </select>
                        <select id="monthSelect" onchange="renderSheet()" class="bg-white/20 text-[10px] p-2 rounded-xl font-bold outline-none">
                            <option value="0">JANUARY</option><option value="1">FEBRUARY</option><option value="2">MARCH</option>
                            <option value="3">APRIL</option><option value="4">MAY</option><option value="5">JUNE</option>
                            <option value="6">JULY</option><option value="7">AUGUST</option><option value="8">SEPTEMBER</option>
                            <option value="9">OCTOBER</option><option value="10">NOVEMBER</option><option value="11">DECEMBER</option>
                        </select>
                    </div>
                </div>
                <div class="flex flex-col gap-2">
                    <button onclick="importExcel()" class="bg-white text-blue-600 text-[10px] px-4 py-2 rounded-xl font-black">IMPORT EXCEL</button>
                    <button onclick="logout()" class="bg-white/20 text-[10px] px-4 py-2 rounded-xl font-black">LOGOUT</button>
                </div>
            </div>
            <div id="sheetContainer" class="bg-white rounded-3xl shadow-sm border overflow-hidden"></div>
        </div>

        <div id="holidayView" class="hidden p-6">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border mb-6">
                <input type="date" id="holidayInput" class="w-full p-4 bg-slate-50 border rounded-2xl mb-4 outline-none">
                <button onclick="addHoliday()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl">ADD HOLIDAY</button>
            </div>
            <div id="holidayList"></div>
        </div>

        <div class="py-12 text-center text-[10px] text-slate-300 font-bold uppercase tracking-widest">
            © All rights reserved.<br>
            Developed by Udan A. Jayawardene<br>
            <span class="text-blue-200">UDAN JAY™ DIGITAL SOLUTION</span>
        </div>
    </div>
</body>
</html>
