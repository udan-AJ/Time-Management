<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced OT Tracker | CIC Livestock Solutions</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getAuth,
            onAuthStateChanged,
            signOut,
            signInWithEmailAndPassword
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        import {
            getFirestore,
            doc,
            setDoc,
            getDoc,
            collection,
            query,
            getDocs,
            deleteDoc,
            updateDoc
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBT3joJWX-dsz4C9-wKsffepSpXypn1n9E",
            authDomain: "time-management-28962.firebaseapp.com",
            projectId: "time-management-28962",
            storageBucket: "time-management-28962.firebasestorage.app",
            messagingSenderId: "813174935711",
            appId: "1:813174935711:web:066f4442e08e600cf512aa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userHolidays = [];

        onAuthStateChanged(auth, async (user) => {

            if (user) {

                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.remove('hidden');

                await loadHolidays();

                renderSheet();

            } else {

                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('appScreen').classList.add('hidden');
            }
        });

        // =========================
        // FIXED EXCEL IMPORT
        // =========================

        window.importExcel = () => {

            const fileInput = document.createElement('input');

            fileInput.type = 'file';
            fileInput.accept = '.xlsx, .xls';

            fileInput.onchange = async (e) => {

                const file = e.target.files[0];

                const reader = new FileReader();

                reader.onload = async (event) => {

                    const data =
                        new Uint8Array(event.target.result);

                    const workbook = XLSX.read(data, {
                        type: 'array',
                        cellDates: true,
                        dateNF: 'HH:mm'
                    });

                    const firstSheet =
                        workbook.Sheets[workbook.SheetNames[0]];

                    // FIXED
                    const jsonData =
                        XLSX.utils.sheet_to_json(firstSheet, {
                            range: 11,
                            defval: "",
                            raw: false
                        });

                    if (jsonData.length === 0)
                        return alert("Excel ගොනුවේ දත්ත හමු වුනේ නැත!");

                    const user = auth.currentUser;

                    const selectedYear =
                        document.getElementById('yearSelect').value;

                    const selectedMonth =
                        parseInt(document.getElementById('monthSelect').value) + 1;

                    const monthId =
                        `${selectedYear}-${selectedMonth}`;

                    const docRef =
                        doc(db, "users", user.uid, "months", monthId);

                    const docSnap =
                        await getDoc(docRef);

                    let currentData =
                        docSnap.exists() ? docSnap.data() : {};

                    let successCount = 0;

                    jsonData.forEach(row => {

                        let dateKey =
                            Object.keys(row).find(
                                k => k.trim().toLowerCase() === "date"
                            );

                        let inKey =
                            Object.keys(row).find(
                                k => k.trim().toLowerCase() === "check in"
                            );

                        let outKey =
                            Object.keys(row).find(
                                k => k.trim().toLowerCase() === "check out"
                            );

                        let rawDate = row[dateKey];

                        let inTime = row[inKey];

                        let outTime = row[outKey];

                        if (rawDate) {

                            let day = null;

                            if (rawDate instanceof Date) {

                                day = rawDate.getDate();

                            } else {

                                let dayStr =
                                    String(rawDate).trim();

                                let parts =
                                    dayStr.split(/[-/]/);

                                if (parts.length >= 3) {

                                    day =
                                        parts[0].length === 4
                                            ? parseInt(parts[2])
                                            : parseInt(parts[0]);

                                } else {

                                    day = parseInt(dayStr);
                                }
                            }

                            if (day && day >= 1 && day <= 31) {

                                currentData[String(day)] = {

                                    in: formatTime(inTime),

                                    out: formatTime(outTime)
                                };

                                successCount++;
                            }
                        }
                    });

                    if (successCount > 0) {

                        await setDoc(docRef, currentData, {
                            merge: true
                        });

                        alert(`සාර්ථකයි! දින ${successCount} ක දත්ත ඇතුළත් කළා.`);

                        renderSheet();

                    } else {

                        alert("දත්ත කියවීමට නොහැකි විය.");
                    }
                };

                reader.readAsArrayBuffer(file);
            };

            fileInput.click();
        };

        // =========================
        // FIXED TIME FORMAT
        // =========================

        function formatTime(val) {

            if (!val || val === "00:00" || val === "0:00") {
                return "";
            }

            let h = 0;
            let m = 0;

            // Excel Date Object
            if (val instanceof Date) {

                h = val.getHours();

                m = val.getMinutes();

                // FIX ONE MINUTE LESS ISSUE
                if (val.getSeconds() >= 30) {
                    m++;
                }
            }

            // Excel Numeric Time
            else if (typeof val === 'number') {

                let totalMinutes =
                    Math.round((val * 1440) + 0.00001);

                h = Math.floor(totalMinutes / 60);

                m = totalMinutes % 60;
            }

            // String Time
            else {

                let parts =
                    String(val).trim().split(':');

                if (parts.length >= 2) {

                    h = parseInt(parts[0], 10);

                    m = parseInt(parts[1], 10);

                } else {

                    return "";
                }
            }

            if (m >= 60) {

                h++;

                m = 0;
            }

            h = h % 24;

            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        }

        function calculateHours(inTime, outTime) {

            if (!inTime || !outTime ||
                inTime === "00:00" ||
                outTime === "00:00")
                return 0;

            let [h1, m1] =
                inTime.split(':').map(Number);

            let [h2, m2] =
                outTime.split(':').map(Number);

            let totalMinutes =
                (h2 * 60 + m2) -
                (h1 * 60 + m1);

            if (totalMinutes < 0)
                totalMinutes += 1440;

            let rawHours =
                totalMinutes / 60;

            let integerPart =
                Math.floor(rawHours);

            let decimalPart =
                rawHours - integerPart;

            let roundedDecimal;

            if (decimalPart < 0.25)
                roundedDecimal = 0.0;

            else if (decimalPart < 0.55)
                roundedDecimal = 0.5;

            else
                roundedDecimal = 1.0;

            return (
                integerPart + roundedDecimal
            ).toFixed(1);
        }

        async function loadHolidays() {

            const user = auth.currentUser;

            const q =
                query(collection(db,
                    "users",
                    user.uid,
                    "holidays"));

            const querySnapshot =
                await getDocs(q);

            userHolidays = [];

            querySnapshot.forEach((doc) =>
                userHolidays.push(doc.id)
            );

            renderHolidayList();
        }

        window.addHoliday = async () => {

            const date =
                document.getElementById('holidayInput').value;

            if (!date) return;

            await setDoc(
                doc(db,
                    "users",
                    auth.currentUser.uid,
                    "holidays",
                    date),
                { active: true }
            );

            await loadHolidays();

            renderSheet();
        };

        window.removeHoliday = async (date) => {

            await deleteDoc(
                doc(db,
                    "users",
                    auth.currentUser.uid,
                    "holidays",
                    date)
            );

            await loadHolidays();

            renderSheet();
        };

        function renderHolidayList() {

            const list =
                document.getElementById('holidayList');

            list.innerHTML =
                userHolidays.map(date => `
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl mb-2 border border-slate-200">
                    <span class="font-bold text-slate-700">${date}</span>

                    <button onclick="removeHoliday('${date}')"
                        class="text-red-500 text-[10px] font-black uppercase">
                        Remove
                    </button>
                </div>
            `).join('')
            ||
            `<p class="text-slate-400 text-xs text-center py-4">
                Holidays List Empty
            </p>`;
        }

        async function renderSheet() {

            const user =
                auth.currentUser;

            if (!user) return;

            const month =
                parseInt(
                    document.getElementById('monthSelect').value
                );

            const year =
                parseInt(
                    document.getElementById('yearSelect').value
                );

            const container =
                document.getElementById('sheetContainer');

            const daysInMonth =
                new Date(year, month + 1, 0).getDate();

            const monthId =
                `${year}-${month + 1}`;

            container.innerHTML =
                "<div class='p-10 text-center text-slate-400 text-xs'>Loading...</div>";

            const docSnap =
                await getDoc(
                    doc(db,
                        "users",
                        user.uid,
                        "months",
                        monthId)
                );

            const savedData =
                docSnap.exists()
                    ? docSnap.data()
                    : {};

            container.innerHTML = "";

            let monthlyTotal = 0;

            for (let d = 1; d <= daysInMonth; d++) {

                const dateObj =
                    new Date(year, month, d);

                const dateStr =
                    dateObj.toLocaleDateString('en-CA');

                const isWeekend =
                    dateObj.getDay() === 0 ||
                    dateObj.getDay() === 6;

                const isHoliday =
                    userHolidays.includes(dateStr);

                const dayData =
                    savedData[String(d)] ||
                    { in: "", out: "" };

                const hrs =
                    calculateHours(dayData.in, dayData.out);

                monthlyTotal += parseFloat(hrs);

                const row =
                    document.createElement('div');

                row.className =
                    `flex items-center gap-2 p-3 border-b ${
                        isHoliday
                            ? 'bg-red-50'
                            : (
                                isWeekend
                                    ? 'bg-orange-50'
                                    : 'bg-white'
                            )
                    }`;

                row.innerHTML = `
                    <div class="w-10 text-center">

                        <span class="block text-[8px] font-bold text-slate-400 uppercase">
                            ${dateObj.toLocaleDateString('en-US', {
                                weekday: 'short'
                            })}
                        </span>

                        <span class="text-lg font-black text-slate-700 leading-none">
                            ${d}
                        </span>
                    </div>

                    <div class="flex-1 grid grid-cols-2 gap-2">

                        <input type="time"
                            value="${dayData.in}"
                            onchange="updateRecord(${d}, 'in', this.value)"
                            class="p-2 rounded-xl border text-sm outline-none focus:ring-2 focus:ring-blue-400 transition">

                        <input type="time"
                            value="${dayData.out}"
                            onchange="updateRecord(${d}, 'out', this.value)"
                            class="p-2 rounded-xl border text-sm outline-none focus:ring-2 focus:ring-blue-400 transition">
                    </div>

                    <div class="w-12 text-right font-black text-blue-600 text-xs">
                        ${hrs}h
                    </div>
                `;

                container.appendChild(row);
            }

            document.getElementById('totalHrs').innerText =
                monthlyTotal.toFixed(1) + " Hrs";
        }

        window.updateRecord = async (day, type, value) => {

            const user =
                auth.currentUser;

            const monthId =
                `${document.getElementById('yearSelect').value}-${
                    parseInt(document.getElementById('monthSelect').value) + 1
                }`;

            const docRef =
                doc(db,
                    "users",
                    user.uid,
                    "months",
                    monthId);

            await setDoc(docRef, {
                [String(day)]: {
                    [type]: value
                }
            }, {
                merge: true
            });

            renderSheet();
        };

        // =========================
        // CLEAR DATA BUTTON FUNCTION
        // =========================

        window.clearMonthData = async () => {

            const confirmClear = confirm(
                "Are you sure you want to clear this month's data?"
            );

            if (!confirmClear) return;

            const user = auth.currentUser;

            const monthId =
                `${document.getElementById('yearSelect').value}-${
                    parseInt(document.getElementById('monthSelect').value) + 1
                }`;

            try {

                await deleteDoc(
                    doc(db,
                        "users",
                        user.uid,
                        "months",
                        monthId)
                );

                alert("Month data cleared successfully.");

                renderSheet();

            } catch (error) {

                console.error(error);

                alert("Failed to clear data.");
            }
        };

        window.switchTab = (tab) => {

            document.getElementById('sheetView')
                .classList.toggle('hidden', tab !== 'sheet');

            document.getElementById('holidayView')
                .classList.toggle('hidden', tab !== 'holidays');

            document.getElementById('tabSheet').className =
                tab === 'sheet'
                    ? 'flex-1 py-4 text-blue-600 border-b-4 border-blue-600 font-black text-xs uppercase'
                    : 'flex-1 py-4 text-slate-400 font-bold text-xs uppercase';

            document.getElementById('tabHolidays').className =
                tab === 'holidays'
                    ? 'flex-1 py-4 text-blue-600 border-b-4 border-blue-600 font-black text-xs uppercase'
                    : 'flex-1 py-4 text-slate-400 font-bold text-xs uppercase';
        };

        window.handleLogin = () =>
            signInWithEmailAndPassword(
                auth,
                document.getElementById('email').value,
                document.getElementById('pass').value
            ).catch(err =>
                alert("Login Failed: " + err.message)
            );

        window.logout = () => signOut(auth);

        window.renderSheet = renderSheet;

    </script>
</head>
