<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure OT Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. ඔබේ Firebase Config එක මෙතනට දාන්න
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI Elements
        const authScreen = document.getElementById('authScreen');
        const appScreen = document.getElementById('appScreen');
        const userEmailDisp = document.getElementById('userEmailDisp');
        const historyList = document.getElementById('historyList');

        // --- AUTHENTICATION FUNCTIONS ---
        window.handleAuth = async (type) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                if (type === 'signup') await createUserWithEmailAndPassword(auth, email, pass);
                else await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) { alert("Error: " + e.message); }
        };

        window.logout = () => signOut(auth);

        // --- MONITOR AUTH STATE ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                authScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                userEmailDisp.innerText = user.email;
                loadData(user.uid);
            } else {
                authScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
            }
        });

        // --- DATABASE FUNCTIONS ---
        window.addEntry = async () => {
            const user = auth.currentUser;
            const salary = parseFloat(document.getElementById('salary').value);
            const otHours = parseFloat(document.getElementById('otHours').value);
            const otRate = parseFloat(document.getElementById('otRate').value);

            if(!salary || !otHours) return alert("විස්තර පුරවන්න!");

            const amount = (salary / 160) * otRate * otHours;

            await addDoc(collection(db, "ot_records"), {
                uid: user.uid,
                hours: otHours,
                amount: amount.toFixed(2),
                timestamp: new Date()
            });
            document.getElementById('otHours').value = "";
        };

        function loadData(uid) {
            const q = query(collection(db, "ot_records"), where("uid", "==", uid), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                historyList.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    div.className = "flex justify-between p-4 bg-white rounded-2xl shadow-sm mb-2 border border-slate-100";
                    div.innerHTML = `
                        <div class="text-xs text-slate-500 font-bold">${data.timestamp.toDate().toLocaleDateString()}<br><span class="text-slate-800 text-sm">${data.hours} Hours</span></div>
                        <div class="text-blue-600 font-black text-lg">Rs. ${data.amount}</div>
                    `;
                    historyList.appendChild(div);
                });
            });
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div id="authScreen" class="max-w-md mx-auto mt-20 p-8 text-center">
        <h1 class="text-3xl font-black text-slate-800 mb-2">OT Tracker Pro</h1>
        <p class="text-slate-500 mb-8 text-sm">ගිණුමට ඇතුළු වන්න හෝ අලුත් එකක් සාදන්න</p>
        <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-3 rounded-2xl border outline-none focus:ring-2 focus:ring-blue-400">
        <input type="password" id="pass" placeholder="Password" class="w-full p-4 mb-6 rounded-2xl border outline-none focus:ring-2 focus:ring-blue-400">
        <div class="grid grid-cols-2 gap-4">
            <button onclick="handleAuth('login')" class="bg-blue-600 text-white font-bold py-4 rounded-2xl">Login</button>
            <button onclick="handleAuth('signup')" class="bg-slate-200 text-slate-700 font-bold py-4 rounded-2xl text-sm">Sign Up</button>
        </div>
    </div>

    <div id="appScreen" class="hidden max-w-md mx-auto pb-10">
        <div class="bg-blue-600 p-6 text-white flex justify-between items-center rounded-b-[2.5rem] shadow-xl">
            <div>
                <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest">Active Account</p>
                <h2 id="userEmailDisp" class="text-sm font-bold truncate w-40">user@email.com</h2>
            </div>
            <button onclick="logout()" class="bg-blue-500 hover:bg-blue-700 p-3 rounded-xl text-xs font-bold transition">Sign Out</button>
        </div>

        <div class="px-4 mt-6 space-y-6">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <input type="number" id="salary" placeholder="පඩිය (Basic)" class="p-3 bg-slate-50 rounded-xl outline-none text-sm border focus:border-blue-300">
                    <select id="otRate" class="p-3 bg-slate-50 rounded-xl outline-none text-sm border">
                        <option value="1.5">1.5x Rate</option>
                        <option value="2.0">2.0x Rate</option>
                    </select>
                </div>
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">OT පැය ගණන</label>
                <input type="number" id="otHours" placeholder="0" class="w-full mt-1 p-5 bg-blue-50 border-2 border-blue-100 rounded-2xl outline-none text-3xl font-black text-center text-blue-700 mb-4">
                <button onclick="addEntry()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">Record එක Save කරන්න</button>
            </div>

            <div>
                <h3 class="text-slate-700 font-bold mb-3 ml-2">History වාර්තා</h3>
                <div id="historyList" class="space-y-2"></div>
            </div>
        </div>
    </div>

</body>
</html>
